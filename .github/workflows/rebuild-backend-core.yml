name: Rebuild backend-core

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend-core deploy workflow
        env:
          GH_TOKEN: ${{ secrets.BACKEND_CORE_DISPATCH_TOKEN }}
          TARGET_REPOSITORY: flabbycloud/backend-core
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPOSITORY}/dispatches" \
            -d '{"event_type":"docs-updated","client_payload":{"source":"docs"}}'
